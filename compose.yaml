services:
  app:
    container_name: elara-app
    image: elara-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - elara_network
    ports:
      - '80:80'
      - '443:443'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    # IMPORTANT: Remove this line
    # command: composer install
    tty: true

  database:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: elara-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql:rw
    networks:
      - elara_network

volumes:
  database_data:
  caddy_data:
  caddy_config:

networks:
  elara_network: